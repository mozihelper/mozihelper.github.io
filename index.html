<!DOCTYPE html>
<html lang="ru" data-theme="dusk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoziHelper</title>
<script>
  // тема запоминается (общий ключ со страницами семестров)
  try {
    var t = localStorage.getItem('la_theme') || 'dusk';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dusk');
  }
</script>
<style>
  :root, [data-theme="dusk"] {
    --bg: #0a0c10;
    --bg-card: #13161c;
    --bg-elev: #1f242c;
    --ink: #eceef2;
    --ink-soft: #a4abb8;
    --ink-mute: #687081;
    --accent: #5ba4ff;
    --accent-strong: #2d88ff;
    --accent-deep: #1877f2;
    --border: #2a2f38;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
  }

  [data-theme="paper"] {
    --bg: #f0f2f5;
    --bg-card: #ffffff;
    --bg-elev: #ffffff;
    --ink: #1c1e21;
    --ink-soft: #444950;
    --ink-mute: #8a8d91;
    --accent: #1877f2;
    --accent-strong: #1877f2;
    --accent-deep: #0d5dc9;
    --border: #dadde1;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.10);
    color-scheme: light;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* переключатель темы */
  .theme-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 42px;
    height: 42px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--ink-soft);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent-strong); color: var(--accent); }
  .theme-btn:focus-visible { outline: none; border-color: var(--accent-strong); color: var(--accent); }
  .theme-btn svg { width: 19px; height: 19px; }
  .theme-btn .icon-sun { display: none; }
  .theme-btn .icon-moon { display: block; }
  [data-theme="paper"] .theme-btn .icon-sun { display: block; }
  [data-theme="paper"] .theme-btn .icon-moon { display: none; }

  .home {
    width: 100%;
    max-width: 560px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(30px, 6vh, 52px);
  }

  .head { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .wordmark {
    font-size: clamp(2.6rem, 7.5vw, 4.6rem);
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.02;
  }
  .wordmark .accent { color: var(--accent); }

  .prompt {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }

  .semesters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    width: 100%;
  }

  .sem-btn {
    flex: 1 1 0;
    min-width: 150px;
    max-width: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 22px 20px;
    border-radius: 16px;
    font-size: 1.15rem;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }

  /* активная кнопка (2 семестр) */
  .sem-btn.active {
    color: #fff;
    background: linear-gradient(180deg, var(--accent-strong) 0%, var(--accent-deep) 100%);
    border-color: var(--accent-strong);
    box-shadow: var(--shadow);
    cursor: pointer;
  }
  .sem-btn.active:hover { transform: translateY(-3px); }
  .sem-btn.active:active { transform: translateY(-1px); }
  .sem-btn.active:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* неактивная кнопка (1 семестр — пока недоступна) */
  .sem-btn.disabled {
    color: var(--ink-mute);
    background: var(--bg-elev);
    cursor: not-allowed;
  }
  .sem-btn.disabled .soon {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  @media (prefers-reduced-motion: reduce) {
    body, .sem-btn, .theme-btn { transition: none; }
    .sem-btn.active:hover { transform: none; }
  }
</style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()" aria-label="Сменить тему">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <main class="home">
    <div class="head">
      <h1 class="wordmark">Mozi<span class="accent">Helper</span></h1>
      <p class="prompt">Выберите семестр</p>
    </div>

    <nav class="semesters">
      <!-- 1 семестр: пока недоступен (ссылка не добавлена) -->
      <a class="sem-btn active" href="algebra-sem1.html">
        1 семестр
      </a>

      <!-- 2 семестр: укажи здесь имя своего файла 2-го семестра -->
      <a class="sem-btn active" href="algebra-sem2.html">
        2 семестр
      </a>
    </nav>
  </main>

  <script>
    function toggleTheme() {
      var cur = document.documentElement.getAttribute('data-theme') || 'dusk';
      var next = cur === 'dusk' ? 'paper' : 'dusk';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('la_theme', next); } catch (e) {}
    }
  </script>
</body>
</html>
